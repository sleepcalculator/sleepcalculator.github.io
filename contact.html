<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ENSHGPNZ23"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ENSHGPNZ23');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - SleepCalculator</title>
  <meta name="description" content="Get in touch with Caroline at SleepCalculator. Reach out for feedback, technical developer questions, or support queries." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://sleepcalculator.github.io/contact" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
  <style>
    .contact-hero {
      background: linear-gradient(135deg, #eef2ff 0%, #fdf4ff 50%, #eff6ff 100%);
      padding: 140px 0 60px;
      text-align: center;
    }
    .contact-section {
      background: var(--bg-card);
      padding: 60px 0 96px;
    }
    .contact-card {
      max-width: 600px;
      margin: 0 auto;
      background: var(--bg-alt);
      border-radius: var(--radius);
      padding: 40px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .contact-info-block {
      text-align: center;
      margin-bottom: 32px;
    }
    .contact-info-block p {
      margin-top: 8px;
    }
    .email-link {
      font-family: 'Fraunces', serif;
      font-size: 1.6rem;
      color: var(--primary);
      font-weight: 700;
      word-break: break-all;
      transition: color 0.2s;
    }
    .email-link:hover {
      color: var(--primary-dark);
    }
    .form-input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }
    .form-input:focus {
      border-color: var(--primary);
    }
    .form-textarea {
      min-height: 140px;
      resize: vertical;
    }
  </style>
</head>
<body>

  <div id="header-root"></div>

  <main>
    <section class="contact-hero">
      <div class="container">
        <span class="section-tag">✦ Say Hello</span>
        <h1>Get In Touch</h1>
      </div>
    </section>

    <section class="contact-section">
      <div class="container">
        <div class="contact-card">
          <div class="contact-info-block">
            <p>For feature suggestions, performance bug reports, SEO inquiries, or technical feedback, drop an email straight to my desk:</p>
            <div style="margin-top: 20px;">
              <a href="mailto:shabanashafiqkhi@gmail.com" class="email-link">shabanashafiqkhi@gmail.com</a>
            </div>
          </div>

          <hr style="border: none; border-top: 1px solid var(--border); margin: 32px 0;" />

          <!-- Form setup ready to capture basic details -->
          <form class="planner-form" onsubmit="event.preventDefault(); alert('Thank you! Please click the email link above to send your message directly via email to Caroline.');">
            <div class="form-group" style="margin-bottom: 20px;">
              <label for="contact-name">Your Name</label>
              <input type="text" id="contact-name" class="form-input" placeholder="Alex" required />
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
              <label for="contact-email">Email Address</label>
              <input type="email" id="contact-email" class="form-input" placeholder="alex@example.com" required />
            </div>
            <div class="form-group" style="margin-bottom: 24px;">
              <label for="contact-message">Message</label>
              <textarea id="contact-message" class="form-input form-textarea" placeholder="How can I help you?" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Send Message</button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>

  <script src="header.js"></script>
  <script src="footer.js"></script>
</body>
</html>
