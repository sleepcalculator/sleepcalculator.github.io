<head>

  <meta charset="UTF-8" />

  <title>Contact Us – Sleep Calculator</title>
  <meta name="description" content="Get in touch with the Sleep Calculator team for feedback, support, or inquiries." />
  <link rel="canonical" href="https://sleepcalculator.github.io/contact.html" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #0a1628; --deep: #0d1b2e; --mid: #112240; --panel: #152a47;
      --border: rgba(201,168,76,0.18); --gold: #c9a84c; --gold-dim: rgba(201,168,76,0.55);
      --moon: #e8d5a3; --text: #d8e8f5; --soft: #7a93b0; --muted: #6a7f96;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--ink); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-weight: 300; line-height: 1.7;
      min-height: 100vh; position: relative;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(74,143,168,0.08) 0%, transparent 60%);
      z-index: 0; pointer-events: none;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 120px 24px 80px; position: relative; z-index: 1; text-align: center; }
    
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 16px 0;
      background: rgba(10,22,40,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
    }
    .nav-inner { max-width: 1140px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { text-decoration: none; color: var(--moon); font-family: 'Cormorant Garamond', serif; font-size: 1.35rem; font-weight: 600; }

    h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; color: var(--moon); margin-bottom: 20px; }
    p.subtitle { font-size: 1.1rem; color: var(--soft); margin-bottom: 50px; max-width: 600px; margin-left: auto; margin-right: auto; }

    .contact-card {
      background: rgba(17, 34, 64, 0.4);
      border: 1px solid var(--border);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      margin-bottom: 40px;
      transition: border-color 0.3s ease;
    }
    .contact-card:hover { border-color: var(--gold-dim); }

    .email-link {
      font-size: 1.5rem;
      color: var(--gold);
      text-decoration: none;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      display: block;
      margin: 20px 0;
      word-break: break-all;
    }
    .email-link:hover { color: var(--moon); text-decoration: underline; }

    .back-link { display: inline-block; margin-bottom: 20px; color: var(--gold); text-decoration: none; font-size: 0.9rem; }
    footer { padding: 40px 0; border-top: 1px solid var(--border); text-align: center; font-size: 0.8rem; color: var(--muted); position: relative; z-index: 1; }
  </style>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "name": "Contact Us - Sleep Calculator",
    "url": "https://sleepcalculator.github.io/contact.html",
    "description": "Contact information for Sleep Calculator inquiries.",
    "mainEntity": {
      "@type": "ContactPoint",
      "contactType": "customer support",
      "email": "nolushac@gmail.com",
      "url": "https://sleepcalculator.github.io/contact.html"
    }
  }
  </script>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Sleep<em style="font-style:italic;color:#c9a84c">Calc</em></a>
  </div>
</nav>

<div class="container">
  <a href="index.html" class="back-link">← Back to Calculator</a>
  <h1>Get in Touch</h1>
  <p class="subtitle">Have a question about sleep cycles or feedback on our tools? We'd love to hear from you.</p>

  <div class="contact-card">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
      <polyline points="22,6 12,13 2,6"></polyline>
    </svg>
    <p style="text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.8rem; color: var(--muted);">Direct Email</p>
    <a href="mailto:nolushac@gmail.com" class="email-link">nolushac@gmail.com</a>
    <p style="color: var(--soft); font-size: 0.9rem;">We typically respond within 24-48 hours.</p>
  </div>
</div>

<footer>
  <div class="container" style="padding: 0;">
    &copy; 2026 Sleep Calculator. Designed for better mornings.
  </div>
</footer>

</body>
</html>
